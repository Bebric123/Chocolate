{% extends 'flatpages/default.html' %}

{% block title %}
    <title>Login</title>
{% endblock%}

{% block content %}
    <form class='form' method="post">
        {% csrf_token %}
        {% for field in form %}
            <div>
                <label for="">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <span class="alert-dander">{{ field.errors|join:", " }}</span>
                {% endif %}
            </div>
        {% endfor %}
        <button class="btm" type="submit">Login</button>
    </form>
{% endblock %}
